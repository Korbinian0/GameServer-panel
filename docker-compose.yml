version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gatewaypass
      POSTGRES_DB: gateway
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgres://gateway:gatewaypass@postgres:5432/gateway?sslmode=disable
      - JWT_SECRET=verysecurejwtsecret
      - GRPC_TLS_CERT=/certs/server.crt
      - GRPC_TLS_KEY=/certs/server.key
    volumes:
      - ./backend/certs:/certs
    ports:
      - 50051:50051
      - 8080:8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - 3000:4173
    depends_on:
      - gateway

volumes:
  postgres-data:
